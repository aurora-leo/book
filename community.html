<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>阅读社区</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体（与 check-in.html 一致） */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 0;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: visible;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部状态栏占位 */
    .status-bar {
      height: 8px;
    }

    /* 滚动内容区域 */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 0;
    }

    /* 社区顶部蓝色横幅 */
    .community-banner {
      background: #0f4774; /* 深蓝，接近截图 */
      border-radius: 16px;
      padding: 14px 16px;
      color: #f9fafb;
      margin-bottom: 16px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .community-banner-text-main {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .community-banner-text-sub {
      font-size: 12px;
      opacity: 0.9;
    }
    .community-banner-icon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(191, 219, 254, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .community-banner-icon svg {
      width: 16px;
      height: 16px;
      stroke: #bfdbfe;
      fill: none;
      stroke-width: 1.6;
    }

    /* 社区空状态 */
    .community-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 80px;
      color: #9ca3af;
    }
    .community-empty-icon {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1.5px dashed #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .community-empty-icon svg {
      width: 24px;
      height: 24px;
      stroke: #d1d5db;
      fill: none;
      stroke-width: 1.6;
    }
    .community-empty-text {
      font-size: 13px;
      color: #6b7280;
    }

    /* 动态卡片样式 */
    .post-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: relative;
    }
    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #e5e7eb;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-avatar svg {
      width: 20px;
      height: 20px;
      stroke: #6b7280;
      fill: none;
      stroke-width: 1.5;
    }
    .user-info {
      flex: 1;
    }
    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .post-time {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .post-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
    }
    .post-content {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .post-images {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .post-image {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      object-fit: cover;
    }
    .post-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .post-tag {
      padding: 4px 8px;
      background: #f3f4f6;
      border-radius: 999px;
      font-size: 12px;
      color: #6b7280;
    }
    .post-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }
    .action-button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #f3f4f6;
      border-radius: 999px;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .action-button:hover {
      background: #e5e7eb;
    }
    .action-button svg {
      width: 16px;
      height: 16px;
      stroke: #6b7280;
      fill: none;
      stroke-width: 1.5;
    }
    .delete-button {
      color: #ef4444;
      background: #fee2e2;
    }
    .delete-button:hover {
      background: #fecaca;
    }
    .delete-button svg {
      stroke: #ef4444;
    }

    /* 二次确认对话框 */
    .confirm-dialog {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }
    .confirm-dialog.show {
      opacity: 1;
      visibility: visible;
    }
    .confirm-content {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 320px;
      text-align: center;
    }
    .confirm-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
    }
    .confirm-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }
    .confirm-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .confirm-button {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .confirm-cancel {
      background: #f3f4f6;
      color: #6b7280;
    }
    .confirm-cancel:hover {
      background: #e5e7eb;
    }
    .confirm-delete {
      background: #ef4444;
      color: white;
    }
    .confirm-delete:hover {
      background: #dc2626;
    }

    /* 底部占位 */
    .spacer {
      height: 12px;
    }

    /* 底部导航（与 check-in.html 一致，但激活"社区"） */
    .bottom-nav {
      height: 62px;
      border-top: 1px solid rgba(209, 213, 219, 0.8);
      background: rgba(248, 250, 252, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      margin-bottom: 0;
    }   
    .bottom-nav a {
      text-decoration: none;
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      margin: 0 auto 2px;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .nav-item.active {
      color: #1e3a5f;
      font-weight: 600;
    }
    .nav-item.active .nav-icon svg {
      stroke: #1e3a5f;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
      .bottom-nav {
        border-radius: 0 !important;
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <div class="scroll-container">
        <!-- 顶部社区横幅 -->
        <div class="community-banner" onclick="window.location.href='create-post.html'" style="cursor: pointer;">
          <div>
            <div class="community-banner-text-main">分享你的阅读心得</div>
            <div class="community-banner-text-sub">记录阅读感悟，与书友交流</div>
          </div>
          <div class="community-banner-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
          </div>
        </div>

        <!-- 空状态 -->
        <div class="community-empty" id="emptyState">
          <div class="community-empty-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="9" />
              <path d="M9 10h6" />
              <path d="M9 14h3" />
            </svg>
          </div>
          <div class="community-empty-text">暂无动态</div>
        </div>

        <!-- 动态列表 -->
        <div id="postsContainer"></div>

        <!-- 二次确认对话框 -->
        <div class="confirm-dialog" id="confirmDialog">
          <div class="confirm-content">
            <div class="confirm-title">确认删除</div>
            <div class="confirm-text">您确定要删除这条动态吗？此操作不可恢复。</div>
            <div class="confirm-buttons">
              <button class="confirm-button confirm-cancel" onclick="hideConfirmDialog()">取消</button>
              <button class="confirm-button confirm-delete" onclick="confirmDelete()">删除</button>
            </div>
          </div>
        </div>

        <!-- 底部占位 -->
        <div class="spacer"></div>
      </div>

      <!-- 底部导航 -->
      <div class="bottom-nav">
    <a href="/">
        <div class="nav-item" onclick="window.location.href='home.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div>首页</div>
        </div>
      </a>
      <a href="{% url 'book-list' %}">
        <div class="nav-item" onclick="window.location.href='book-list.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            </svg>
          </div>
          <div>书单</div>
        </div>
        </a>
         <a href="{% url 'check-in' %}">
        <div class="nav-item" onclick="window.location.href='check-in.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <div>打卡</div>
        </div>
      </a>
      <a href="{% url 'community' %}">
        <div class="nav-item active" onclick="window.location.href='community.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div>社区</div>
        </div>
      </a>
      <a href="{% url 'profile' %}">
        <div class="nav-item" onclick="window.location.href='profile.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div>我的</div>
        </div>
      </a>
      </div>

  <script>
    // 全局变量，用于存储当前要删除的动态ID
    let currentDeletePostId = null;

    // 页面加载完成后加载动态
    document.addEventListener('DOMContentLoaded', function() {
      loadPosts();
      generateQRCode();
    });

    // 加载动态列表
    function loadPosts() {
      const postsContainer = document.getElementById('postsContainer');
      const emptyState = document.getElementById('emptyState');
      
      // 从localStorage获取动态
      const posts = JSON.parse(localStorage.getItem('communityPosts') || '[]');
      
      if (posts.length === 0) {
        // 显示空状态
        emptyState.style.display = 'flex';
        postsContainer.innerHTML = '';
      } else {
        // 隐藏空状态
        emptyState.style.display = 'none';
        
        // 渲染动态列表
        postsContainer.innerHTML = posts.map(post => `
          <div class="post-card">
            <div class="post-header">
              <div class="user-avatar">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </div>
              <div class="user-info">
                <div class="user-name">书友</div>
                <div class="post-time">${formatTime(post.timestamp)}</div>
              </div>
            </div>
            ${post.title ? `<div class="post-title">${post.title}</div>` : ''}
            <div class="post-content">${post.content}</div>
            ${post.images.length > 0 ? `
              <div class="post-images">
                ${post.images.map(img => `<img src="${img}" class="post-image" alt="动态图片">`).join('')}
              </div>
            ` : ''}
            ${post.tags.length > 0 ? `
              <div class="post-tags">
                ${post.tags.map(tag => `<span class="post-tag">${tag}</span>`).join('')}
              </div>
            ` : ''}
            <div class="post-actions">
              <button class="action-button">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
                <span>${post.likes}</span>
              </button>
              <button class="action-button">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <span>${post.comments}</span>
              </button>
              <button class="action-button delete-button" onclick="showDeleteConfirm(${post.id})">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
                <span>删除</span>
              </button>
            </div>
          </div>
        `).join('');
      }
    }

    // 格式化时间
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      const minutes = Math.floor(diff / (1000 * 60));
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      
      if (minutes < 60) {
        return `${minutes}分钟前`;
      } else if (hours < 24) {
        return `${hours}小时前`;
      } else {
        return `${days}天前`;
      }
    }

    // 显示删除确认对话框
    function showDeleteConfirm(postId) {
      currentDeletePostId = postId;
      const confirmDialog = document.getElementById('confirmDialog');
      confirmDialog.classList.add('show');
    }

    // 隐藏删除确认对话框
    function hideConfirmDialog() {
      const confirmDialog = document.getElementById('confirmDialog');
      confirmDialog.classList.remove('show');
      currentDeletePostId = null;
    }

    // 确认删除动态
    function confirmDelete() {
      if (!currentDeletePostId) return;
      
      // 从localStorage获取动态
      let posts = JSON.parse(localStorage.getItem('communityPosts') || '[]');
      
      // 过滤掉要删除的动态
      posts = posts.filter(post => post.id !== currentDeletePostId);
      
      // 保存到localStorage
      localStorage.setItem('communityPosts', JSON.stringify(posts));
      
      // 重新加载动态列表
      loadPosts();
      
      // 隐藏对话框
      hideConfirmDialog();
    }

    // 直接使用在线API生成二维码（不依赖CDN）
    function generateQRCode() {
      var qrPlaceholder = document.getElementById('qrPlaceholder');
      if (!qrPlaceholder) return;
      
      var currentUrl = window.location.href;
      var encodedUrl = encodeURIComponent(currentUrl);
      
      // 使用多个在线二维码API，按顺序尝试
      var apiUrls = [
        'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
        'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
        'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
        'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
      ];
      
      var img = document.createElement('img');
      var apiIndex = 0;
      var retryCount = 0;
      var maxRetries = apiUrls.length;
      
      function tryNextAPI() {
        if (apiIndex >= apiUrls.length) {
          // 如果所有API都失败，尝试重新开始
          if (retryCount < 2) {
            retryCount++;
            apiIndex = 0;
            setTimeout(tryNextAPI, 1000);
            return;
          }
          qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
          return;
        }
        
        // 创建新的img元素，避免缓存问题
        img = document.createElement('img');
        img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
        img.alt = '二维码';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        img.style.borderRadius = '8px';
        img.style.display = 'block';
        
        var loadTimeout = setTimeout(function() {
          img.onload = null;
          img.onerror = null;
          apiIndex++;
          tryNextAPI();
        }, 3000);
        
        img.onload = function() {
          clearTimeout(loadTimeout);
          qrPlaceholder.innerHTML = '';
          qrPlaceholder.appendChild(img);
          console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
        };
        
        img.onerror = function() {
          clearTimeout(loadTimeout);
          console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
          apiIndex++;
          tryNextAPI();
        };
      }
      
      // 显示加载状态
      qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
      
      // 开始尝试
      tryNextAPI();
    }
    
    // 每60秒刷新一次二维码
    setInterval(function() {
      generateQRCode();
    }, 60000);
  </script>
</body>
</html>
