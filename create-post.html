<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>发布动态</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #f5f1e8;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体 */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 0;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .status-bar {
      height: 8px;
    }

    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      background: #f5f1e8;
      /* 隐藏滚动条但保持功能 */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* 顶部导航栏 */
    .header {
      background: #ffffff;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .back-button {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .back-button:hover {
      background-color: rgba(15, 71, 116, 0.1);
    }
    .back-button svg {
      width: 20px;
      height: 20px;
      stroke: #0f4774;
      fill: none;
      stroke-width: 2;
    }
    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      flex: 1;
      text-align: center;
    }
    .publish-button {
      padding: 8px 16px;
      background: #0f4774;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .publish-button:hover {
      background: #0d3a5f;
    }
    .publish-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* 发布内容区域 */
    .post-content {
      background: #ffffff;
      margin-top: 1px;
      padding: 16px;
    }
    .post-title {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
      padding: 8px 0;
    }
    .post-title::placeholder {
      color: #9ca3af;
    }
    .post-textarea {
      width: 100%;
      min-height: 150px;
      border: none;
      outline: none;
      font-size: 14px;
      color: #111827;
      resize: none;
      line-height: 1.6;
    }
    .post-textarea::placeholder {
      color: #9ca3af;
    }

    /* 图片上传区域 */
    .post-media {
      background: #ffffff;
      margin-top: 1px;
      padding: 16px;
    }
    .media-upload {
      border: 2px dashed #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .media-upload:hover {
      border-color: #0f4774;
      background-color: rgba(15, 71, 116, 0.02);
    }
    .media-upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      color: #9ca3af;
    }
    .media-upload-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .media-upload-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .media-upload-hint {
      font-size: 12px;
      color: #9ca3af;
    }
    .media-preview {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .remove-preview {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
    }

    /* 标签选择区域 */
    .post-tags {
      background: #ffffff;
      margin-top: 1px;
      padding: 16px;
    }
    .tags-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-item {
      padding: 6px 12px;
      background: #f3f4f6;
      border-radius: 999px;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tag-item:hover {
      background: #e5e7eb;
    }
    .tag-item.active {
      background: #0f4774;
      color: white;
    }

    /* 底部占位 */
    .spacer {
      height: 20px;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <div class="scroll-container">
        <!-- 顶部导航栏 -->
        <div class="header">
          <div class="back-button" onclick="window.location.href='community.html'">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
          </div>
          <div class="header-title">发布动态</div>
          <button class="publish-button" onclick="publishPost()">发布</button>
        </div>

        <!-- 发布内容区域 -->
        <div class="post-content">
          <input type="text" class="post-title" placeholder="请输入标题（可选）" id="postTitle">
          <textarea class="post-textarea" placeholder="分享你的阅读心得..." id="postContent"></textarea>
        </div>

        <!-- 图片上传区域 -->
        <div class="post-media">
          <div class="media-upload" onclick="document.getElementById('fileInput').click()">
            <div class="media-upload-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              </svg>
            </div>
            <div class="media-upload-text">添加图片（可选）</div>
            <div class="media-upload-hint">支持JPG、PNG格式，最多3张</div>
          </div>
          <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
          <div class="media-preview" id="mediaPreview"></div>
        </div>

        <!-- 标签选择区域 -->
        <div class="post-tags">
          <div class="tags-title">选择标签</div>
          <div class="tags-container">
            <div class="tag-item active" data-tag="阅读感悟">#阅读感悟</div>
            <div class="tag-item" data-tag="好书推荐">#好书推荐</div>
            <div class="tag-item" data-tag="读书笔记">#读书笔记</div>
            <div class="tag-item" data-tag="阅读打卡">#阅读打卡</div>
            <div class="tag-item" data-tag="书友交流">#书友交流</div>
            <div class="tag-item" data-tag="阅读心得">#阅读心得</div>
          </div>
        </div>

        <div class="spacer"></div>
      </div>
    </div>
  </div>

  <script>
    // 标签选择功能
    document.addEventListener('DOMContentLoaded', function() {
      const tagItems = document.querySelectorAll('.tag-item');
      tagItems.forEach(tag => {
        tag.addEventListener('click', function() {
          this.classList.toggle('active');
        });
      });

      // 图片上传功能
      const fileInput = document.getElementById('fileInput');
      const mediaPreview = document.getElementById('mediaPreview');

      fileInput.addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        // 限制最多3张图片
        const selectedFiles = files.slice(0, 3);

        mediaPreview.innerHTML = '';
        selectedFiles.forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = function(event) {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';
            previewItem.innerHTML = `
              <img src="${event.target.result}" alt="预览">
              <div class="remove-preview" onclick="removePreview(${index})">×</div>
            `;
            mediaPreview.appendChild(previewItem);
          };
          reader.readAsDataURL(file);
        });
      });
    });

    // 移除预览图片
    function removePreview(index) {
      const previewItems = document.querySelectorAll('.preview-item');
      if (previewItems[index]) {
        previewItems[index].remove();
      }
    }

    // 发布动态功能
    function publishPost() {
      const title = document.getElementById('postTitle').value;
      const content = document.getElementById('postContent').value;
      const selectedTags = Array.from(document.querySelectorAll('.tag-item.active')).map(tag => tag.dataset.tag);
      const previewImages = Array.from(document.querySelectorAll('.preview-item img')).map(img => img.src);

      if (!content.trim()) {
        alert('请输入动态内容');
        return;
      }

      // 创建动态对象
      const post = {
        id: Date.now(), // 使用时间戳作为唯一ID
        title: title.trim(),
        content: content.trim(),
        tags: selectedTags,
        images: previewImages,
        timestamp: new Date().toISOString(),
        likes: 0,
        comments: 0
      };

      // 从localStorage获取现有动态
      let posts = JSON.parse(localStorage.getItem('communityPosts') || '[]');
      
      // 添加新动态到数组开头
      posts.unshift(post);
      
      // 保存到localStorage
      localStorage.setItem('communityPosts', JSON.stringify(posts));

      // 模拟发布过程
      const publishButton = document.querySelector('.publish-button');
      publishButton.disabled = true;
      publishButton.textContent = '发布中...';

      setTimeout(() => {
        alert('动态发布成功！');
        window.location.href = 'community.html';
      }, 1500);
    }

    // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
</body>
</html>
