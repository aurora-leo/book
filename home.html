<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>首页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体 */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 0;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部"状态栏"占位 */
    .status-bar {
      height: 8px;
    }

    /* 滚动内容区域 */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 0;
    }

    /* 欢迎横幅 */
    .welcome-banner {
      background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
      border-radius: 16px;
      padding: 20px 18px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      margin-bottom: 14px;
    }
    .welcome-text {
      flex: 1;
    }
    .welcome-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .welcome-subtitle {
      font-size: 13px;
      opacity: 0.95;
      line-height: 1.4;
    }
    .book-icon {
      font-size: 40px;
      opacity: 0.9;
    }

    /* 搜索栏 */
    .search-bar {
      background: #ffffff;
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      margin-bottom: 14px;
      cursor: pointer;
    }
    .search-icon {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
    }
    .search-placeholder {
      font-size: 14px;
      color: #9ca3af;
      white-space: nowrap;
    }

    /* 区域标题 */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .section-icon svg {
      width: 100%;
      height: 100%;
      fill: #1e3a5f;
    }

    /* 阅读挑战 */
    .challenge-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .challenge-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }
    .challenge-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .challenge-description {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .challenge-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #6b7280;
    }
    .meta-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .meta-icon svg {
      width: 100%;
      height: 100%;
      fill: #1e3a5f;
    }

    /* 精选书籍网格 */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .book-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 9px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all 0.18s ease;
      border: 2px solid transparent;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.16);
    }

    .book-card.selected {
      background-color: #dbeafe;
      border-color: #1e3a8a;
      box-shadow: 0 8px 18px rgba(30, 58, 138, 0.2);
    }

    .book-card.selected .book-title {
      color: #1e3a8a;
      font-weight: 700;
    }
    .book-cover {
      background: #e5e7eb;
      border-radius: 10px;
      aspect-ratio: 3 / 4;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 22px;
      font-weight: 700;
    }
    .book-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 书籍详情抽屉样式（通用） */
    .book-detail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 0;
      background: rgba(15, 23, 42, 0.40);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 40;
      border-radius: 22px;
      overflow: hidden;
    }
    .book-detail-sheet {
      width: 100%;
      max-width: 390px;
      border-radius: 18px 18px 0 0;
      background: #fdfbf7;
      box-shadow: 0 -10px 30px rgba(15, 23, 42, 0.32);
      padding: 14px 18px 18px;
      max-height: 80vh;
    }
    .book-detail-handle {
      width: 38px;
      height: 4px;
      border-radius: 999px;
      background: #e5e7eb;
      margin: 0 auto 10px;
    }
    .book-detail-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .book-detail-cover {
      width: 64px;
      height: 94px;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(135deg, #0f4774, #1e749c);
      flex-shrink: 0;
    }
    .book-detail-main {
      flex: 1;
      min-width: 0;
    }
    .book-detail-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    .book-detail-author {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .book-detail-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 11px;
    }
    .book-detail-chip {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 71, 116, 0.06);
      color: #0f4774;
    }
    .book-detail-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #f59e0b;
    }
    .book-detail-rating span {
      color: #6b7280;
      font-size: 12px;
    }
    .book-detail-desc-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .book-detail-desc {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.5;
      max-height: 150px;
      overflow-y: auto;
    }
    .book-detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .book-detail-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .book-detail-btn-primary {
      background: #0f4774;
      color: #f9fafb;
      box-shadow: 0 6px 18px rgba(15, 71, 116, 0.45);
    }
    .book-detail-btn-secondary {
      background: #ffffff;
      color: #111827;
      border: 1px solid #e5e7eb;
    }

    /* 底部占位 */
    .spacer {
      height: 12px;
    }

    /* 底部导航 */
    .bottom-nav {
      height: 62px;
      border-top: 1px solid rgba(209, 213, 219, 0.8);
      background: rgba(248, 250, 252, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      margin-bottom: 0;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      margin: 0 auto 2px;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .nav-item.active {
      color: #1e3a5f;
      font-weight: 600;
    }
    .nav-item.active .nav-icon svg {
      stroke: #1e3a5f;
    }

    /* 去除底部导航栏链接下划线 */
    .bottom-nav a {
      text-decoration: none;
      color: inherit;
    }
  
    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
      .bottom-nav {
        border-radius: 0 !important;
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <div class="scroll-container">
        <!-- 欢迎横幅 -->
        <div class="welcome-banner">
          <div class="welcome-text">

        <div class="search-bar" onclick="handleSearch()">

          </div>

        </div>

        <!-- 阅读挑战 -->

          <div class="section-icon">

        <div class="challenge-list">

                    <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <script>
    function handleSearch() {
      window.location.href = 'search.html';
    }

    // 书籍详情：通用打开函数
    function openBookDetail(data) {
      var overlay = document.getElementById("bookDetail");
      if (!overlay) return;

      var titleEl = document.getElementById("detailTitle");
      var authorEl = document.getElementById("detailAuthor");
      var tagEl = document.getElementById("detailTag");
      var statusEl = document.getElementById("detailStatus");
      var wordsEl = document.getElementById("detailWords");
      var ratingNumberEl = document.getElementById("detailRatingNumber");
      var ratingTextEl = document.getElementById("detailRatingText");
      var descEl = document.getElementById("detailDesc");
      var closeBtn = document.getElementById("detailClose");

      if (titleEl) titleEl.textContent = data.title || "";
      if (authorEl) authorEl.textContent = (data.author || "") + (data.category ? " · " + data.category : "");
      if (tagEl) tagEl.textContent = data.tag || "书籍详情";
      if (statusEl) statusEl.textContent = data.status || "未开始";
      if (wordsEl) wordsEl.textContent = data.words || "";
      if (ratingNumberEl) ratingNumberEl.textContent = data.rating || "4.8";
      if (ratingTextEl) ratingTextEl.textContent = data.rating ? "你的评分：" + data.rating : "你的评分";
      if (descEl) descEl.textContent = data.desc || "暂无简介";

      overlay.style.display = "flex";

      function hideOverlay() {
        overlay.style.display = "none";
      }

      if (closeBtn) {
        closeBtn.onclick = hideOverlay;
      }

      overlay.onclick = function (e) {
        if (e.target === overlay) {
          hideOverlay();
        }
      };
    }

    function handleBookClick(card) {
      // 移除其他卡片的选中状态
      document.querySelectorAll(".book-card.selected").forEach(c => {
        c.classList.remove("selected");
      });
      // 添加当前卡片的选中状态
      card.classList.add("selected");

      var data = {
        title: card.getAttribute("data-title") || "",
        author: card.getAttribute("data-author") || "",
        category: card.getAttribute("data-category") || "",
        tag: card.getAttribute("data-tag") || "",
        status: card.getAttribute("data-status") || "",
        rating: card.getAttribute("data-rating") || "",
        words: card.getAttribute("data-words") || "",
        desc: card.getAttribute("data-desc") || ""
      };

      openBookDetail(data);
    }

    // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
