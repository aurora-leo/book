<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>我的好友</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体 */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .status-bar {
      height: 8px;
    }

    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      background: #f5f1e8;
      /* 隐藏滚动条但保持功能 */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
     .scroll-container::-webkit-scrollbar {
      display: none;
    }
    
    /* 顶部 tabs 区域 */
    .friends-tabs {
      background: #ffffff;
      overflow: hidden;
      border-bottom: 1px solid #e5e7eb;
    }
    .friends-tabs-header {
      display: flex;
      align-items: center;
     padding: 0 16px;
    }
    .back-button {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 8px;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .back-button:hover {
      background-color: rgba(15, 71, 116, 0.1);
    }
    .back-button svg {
      width: 20px;
      height: 20px;
      stroke: #0f4774;
      fill: none;
      stroke-width: 2;
    }
    .friends-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
      position: relative;
    }
    .friends-tab.active {
      color: #0f4774;
      font-weight: 600;
    }
    .friends-tab.active::after {
      content: "";
      position: absolute;
      left: 20%;
      right: 20%;
      bottom: 0;
      height: 2px;
      border-radius: 999px;
      background: #0f4774;
    }

    /* 顶部"添加好友"按钮行 */
    .friends-toolbar {
      background: #ffffff;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar-button {
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #111827;
      cursor: pointer;
    }
    .toolbar-button-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #0f4774;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 6px;
    }
    .toolbar-button-icon svg {
      width: 12px;
      height: 12px;
      stroke: #f9fafb;
      fill: none;
      stroke-width: 1.6;
    }
    .toolbar-arrow {
      width: 14px;
      height: 14px;
    }
    .toolbar-arrow svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.7;
    }

    /* 内容区域：空状态 */
    .friends-content {
      background: #f5f1e8;
      padding: 100px 20px 120px;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #6b7280;
      min-height: 300px;
    }
    .friends-content.active {
      display: flex;
    }
    .friends-empty-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .friends-empty-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .friends-empty-main {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
    }
    .friends-empty-sub {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .spacer {
      height: 20px;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <div class="scroll-container">
        <div class="friends-tabs">
          <div class="friends-tabs-header">
            <a href="../">
                <div class="back-button" onclick="window.location.href='profile.html'" >
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 12H5" />
                <path d="M12 19l-7-7 7-7" />
              </svg>
            </div>
            </a>
            <div class="friends-tab active" data-tab="mine">我的好友 (0)</div>
            <div class="friends-tab" data-tab="request">好友申请</div>
          </div>

          <a href="{% url 'add-friend' %}" style="text-decoration:none;">
              <div class="friends-toolbar" onclick="window.location.href='add-friend.html'" style="cursor: pointer;">
            <div class="toolbar-button">
              <div class="toolbar-button-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
              </div>
              <span>添加好友</span>
            </div>
            <div class="toolbar-arrow">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 18l6-6-6-6" />
              </svg>
            </div>
          </div>
          </a>

          <!-- 我的好友内容 -->
          <div class="friends-content active" id="tab-mine">
            <div>
              <div class="friends-empty-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="9" cy="8" r="3" />
                  <circle cx="17" cy="8" r="3" />
                  <path d="M3 20a4 4 0 0 1 8 0" />
                  <path d="M13 20a4 4 0 0 1 8 0" />
                </svg>
              </div>
              <div class="friends-empty-main">还没有好友</div>
              <div class="friends-empty-sub">点击上方“添加好友”开始添加</div>
            </div>
          </div>

          <!-- 好友申请内容 -->
          <div class="friends-content" id="tab-request">
            <div>
              <div class="friends-empty-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="12" cy="8" r="3" />
                  <path d="M5 20a7 7 0 0 1 14 0" />
                  <path d="M12 11v3" />
                  <path d="M12 17h.01" />
                </svg>
              </div>
              <div class="friends-empty-main">暂无好友申请</div>
            </div>
          </div>
        </div>

        <div class="spacer"></div>
      </div>
    </div>
  </div>

  <script>
    // 顶部 Tab 切换
    document.addEventListener('DOMContentLoaded', function () {
      var tabs = document.querySelectorAll('.friends-tab');
      var mine = document.getElementById('tab-mine');
      var request = document.getElementById('tab-request');

      function setActive(tabName) {
        tabs.forEach(function (t) {
          t.classList.toggle('active', t.getAttribute('data-tab') === tabName);
        });
        if (mine && request) {
          mine.classList.toggle('active', tabName === 'mine');
          request.classList.toggle('active', tabName === 'request');
        }
      }

      tabs.forEach(function (t) {
        t.addEventListener('click', function () {
          var name = t.getAttribute('data-tab');
          setActive(name || 'mine');
        });
      });
    });

 // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
</body>
</html>
