<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>书单</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体 */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 0;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部“状态栏”占位 */
    .status-bar {
      height: 8px;
    }

    /* 滚动内容区域 */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 0;
      /* 隐藏滚动条 */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* 搜索栏 */
    .search-bar {
      background: #ffffff;
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      margin-bottom: 14px;
    }
    .search-icon {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
    }
    .search-placeholder {
      font-size: 14px;
      color: #9ca3af;
      white-space: nowrap;
    }

    /* Tab 切换 */
    .tab-bar {
      display: flex;
      background: #ffffff;
      border-radius: 16px;
      padding: 4px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      margin-bottom: 16px;
    }
    .tab-item {
      flex: 1;
      padding: 10px 0;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s ease;
    }
    .tab-item.active {
      background: #1e3a5f;
      color: #f9fafb;
    }

    /* 内容块公共 */
    .section {
      margin-bottom: 16px;
    }

    /* 推荐书单 */
    .empty-state {
      padding: 72px 0 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #6b7280;
    }
    .empty-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 2px dashed #9ca3af;
      margin-bottom: 14px;
      position: relative;
    }
    .empty-icon::before,
    .empty-icon::after {
      content: "";
      position: absolute;
      background: #9ca3af;
    }
    .empty-icon::before {
      width: 22px;
      height: 3px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .empty-icon::after {
      width: 3px;
      height: 22px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .empty-text {
      font-size: 13px;
      white-space: nowrap;
    }

    /* 分类筛选 */
    .category-scroll {
      overflow-x: auto;
      margin-bottom: 12px;
    }
    .category-row {
      display: inline-flex;
      gap: 8px;
    }
    .chip {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      font-size: 13px;
      color: #6b7280;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: all 0.16s ease;
    }
    .chip.active {
      background: #1e3a5f;
      border-color: #1e3a5f;
      color: #f9fafb;
      font-weight: 600;
    }

    /* 书籍详情抽屉样式（通用） */
    .book-detail-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 0;
      background: rgba(15, 23, 42, 0.40);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 40;
      border-radius: 22px;
      overflow: hidden;
    }
    .book-detail-sheet {
      width: 100%;
      max-width: 390px;
      max-height: 80vh;
      border-radius: 18px 18px 0 0;
      background: #fdfbf7;
      box-shadow: 0 -10px 30px rgba(15, 23, 42, 0.32);
      padding: 14px 18px 18px;
    }
    .book-detail-handle {
      width: 38px;
      height: 4px;
      border-radius: 999px;
      background: #e5e7eb;
      margin: 0 auto 10px;
    }
    .book-detail-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .book-detail-cover {
      width: 64px;
      height: 94px;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(135deg, #0f4774, #1e749c);
      flex-shrink: 0;
    }
    .book-detail-main {
      flex: 1;
      min-width: 0;
    }
    .book-detail-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    .book-detail-author {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .book-detail-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 11px;
    }
    .book-detail-chip {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 71, 116, 0.06);
      color: #0f4774;
    }
    .book-detail-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #f59e0b;
    }
    .book-detail-rating span {
      color: #6b7280;
      font-size: 12px;
    }
    .book-detail-desc-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .book-detail-desc {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.5;
      max-height: 150px;
      overflow-y: auto;
    }
    .book-detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .book-detail-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .book-detail-btn-primary {
      background: #0f4774;
      color: #f9fafb;
      box-shadow: 0 6px 18px rgba(15, 71, 116, 0.45);
    }
    .book-detail-btn-secondary {
      background: #ffffff;
      color: #111827;
      border: 1px solid #e5e7eb;
    }

    /* 书籍网格 */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .book-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 9px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all 0.18s ease;
      border: 2px solid transparent;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.16);
    }

    .book-card.selected {
      background-color: #dbeafe;
      border-color: #1e3a8a;
      box-shadow: 0 8px 18px rgba(30, 58, 138, 0.2);
    }

    .book-card.selected .book-title {
      color: #1e3a8a;
      font-weight: 700;
    }
    .book-cover {
      background: #e5e7eb;
      border-radius: 10px;
      aspect-ratio: 3 / 4;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 22px;
      font-weight: 700;
    }
    .book-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .books-empty {
      grid-column: 1 / -1;
      padding: 70px 0 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #6b7280;
      font-size: 13px;
    }

    /* 底部导航 */
    .bottom-nav {
      height: 62px;
      border-top: 1px solid rgba(209, 213, 219, 0.8);
      background: rgba(248, 250, 252, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      margin-bottom: 0;
    }
       
    .bottom-nav a {
      text-decoration: none;
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      margin: 0 auto 2px;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .nav-item.active {
      color: #1e3a5f;
      font-weight: 600;
    }
    .nav-item.active .nav-icon svg {
      stroke: #1e3a5f;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
      .bottom-nav {
        border-radius: 0 !important;
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <div class="scroll-container">
        <!-- 搜索栏 -->
        <div class="search-bar" onclick="window.location.href='search.html'">
          <div class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
              <path d="m20 20-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="search-placeholder">搜索书籍、作者...</div>

        <!-- Tab -->
        <div class="tab-bar">
          <div class="tab-item active" data-tab="lists">推荐书单</div>
          <div class="tab-item" data-tab="books">全部书籍</div>

        <!-- 推荐书单内容（默认：空状态） -->
        <div class="section" id="tab-lists">
          <div class="empty-state">
            <div class="empty-icon"></div>
            <div class="empty-text">暂无书单</div>

        <!-- 全部书籍内容 -->
        <div class="section" id="tab-books" style="display: none;">
          <!-- 分类筛选 -->
          <div class="category-scroll">
            <div class="category-row">
              <div class="chip active" data-category="全部">全部</div>
              <div class="chip" data-category="文学">文学</div>
              <div class="chip" data-category="科幻">科幻</div>
              <div class="chip" data-category="历史">历史</div>
              <div class="chip" data-category="童话">童话</div>
              <div class="chip" data-category="社科">社科</div>
            </div>
          </div>

          <!-- 书籍网格 -->
          <div class="book-grid" id="book-grid"></div>
        </div>

        <!-- 底部占位 -->
        <div style="height: 12px;"></div>
      </div>

      <!-- 底部导航 -->
      <div class="bottom-nav">
    <a href="/">
        <div class="nav-item" onclick="window.location.href='home.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>

      </a>
      <a href="{% url 'book-list' %}">
        <div class="nav-item active" onclick="window.location.href='book-list.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>

          <div>书单</div>
        </div>

         <a href="{% url 'check-in' %}">
        <div class="nav-item" onclick="window.location.href='check-in.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="9 11 12 14 22 4"/>

            </svg>
          </div>
          <div>打卡</div>
        </div>
      </a>
      <a href="{% url 'community' %}">
        <div class="nav-item" onclick="window.location.href='community.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      <a href="{% url 'profile' %}">

      </div>

      <!-- 书籍详情底部抽屉 -->
      <div class="book-detail-overlay" id="bookDetail">
        <div class="book-detail-sheet">
          <div class="book-detail-handle"></div>
          <div class="book-detail-header">
            <div class="book-detail-cover" id="detailCover"></div>
            <div class="book-detail-main">
              <div class="book-detail-title" id="detailTitle">书名</div>

              </div>
            </div>

  <!-- 简单交互：Tab 切换 + 分类过滤 -->
  <script>
    // 书籍详情：通用打开函数
    function openBookDetail(data) {
      var overlay = document.getElementById("bookDetail");
      if (!overlay) return;

      var titleEl = document.getElementById("detailTitle");
      var authorEl = document.getElementById("detailAuthor");
      var tagEl = document.getElementById("detailTag");
      var statusEl = document.getElementById("detailStatus");
      var wordsEl = document.getElementById("detailWords");
      var ratingNumberEl = document.getElementById("detailRatingNumber");
      var ratingTextEl = document.getElementById("detailRatingText");
      var descEl = document.getElementById("detailDesc");
      var closeBtn = document.getElementById("detailClose");

      if (titleEl) titleEl.textContent = data.title || "";
      if (authorEl) authorEl.textContent = (data.author || "") + (data.category ? " · " + data.category : "");
      if (tagEl) tagEl.textContent = data.tag || "书籍详情";
      if (statusEl) statusEl.textContent = data.status || "未开始";
      if (wordsEl) wordsEl.textContent = data.words || "";
      if (ratingNumberEl) ratingNumberEl.textContent = data.rating || "4.8";
      if (ratingTextEl) ratingTextEl.textContent = data.rating ? "你的评分：" + data.rating : "你的评分";
      if (descEl) descEl.textContent = data.desc || "暂无简介";

      overlay.style.display = "flex";

      function hideOverlay() {
        overlay.style.display = "none";
      }

      if (closeBtn) {
        closeBtn.onclick = hideOverlay;
      }

      overlay.onclick = function (e) {
        if (e.target === overlay) {
          hideOverlay();
        }
      };
    }

    // 模拟书籍数据（对应你的第一个截图）

        title: "小王子",
        author: "圣埃克苏佩里",

        desc: "一部写给大人的童话，关于爱、孤独与成长，看似简单却耐人寻味。"

    ];

    // 书单名称模板
    const listNames = [
      "精选好书", "高分推荐", "热门榜单", "本周必读", "经典收藏",
      "新书速递", "读者最爱", "编辑推荐", "口碑佳作", "心灵成长"
    ];

    // 随机生成书单
    function generateRandomLists() {
      const lists = [];
      const listCount = Math.floor(Math.random() * 3) + 3; // 随机生成3-5个书单
      const usedListNames = new Set();
      
      // 确保有足够的书单名称可用
      const availableListNames = [...listNames];
      
      for (let i = 0; i < listCount && availableListNames.length > 0; i++) {
        // 随机选择书单名称，并确保不重复
        const nameIndex = Math.floor(Math.random() * availableListNames.length);
        const listName = availableListNames[nameIndex];
        
        // 从可用名称中移除已使用的名称
        availableListNames.splice(nameIndex, 1);
        
        // 随机选择2-4本书
        const bookCount = Math.floor(Math.random() * 3) + 2;
        const listBooks = [];
        const usedBookIndices = new Set();
        
        while (listBooks.length < bookCount && listBooks.length < books.length) {
          const bookIndex = Math.floor(Math.random() * books.length);
          if (!usedBookIndices.has(bookIndex)) {
            usedBookIndices.add(bookIndex);
            listBooks.push(books[bookIndex]);
          }
        }
        
        lists.push({
          id: i + 1,
          name: listName,
          books: listBooks,
          cover: listBooks[0] // 使用第一本书作为书单封面
        });
      }
      
      return lists;
    }

    // 渲染书单
    function renderLists() {
      const lists = generateRandomLists();
      const tabLists = document.getElementById("tab-lists");
      
      tabLists.innerHTML = "";
      
      lists.forEach(list => {
        const listSection = document.createElement("div");
        listSection.className = "section";
        
        // 书单标题
        const listTitle = document.createElement("div");
        listTitle.style.cssText = `
          font-size: 16px;
          font-weight: 700;
          margin-bottom: 10px;
          color: #111827;
        `;
        listTitle.textContent = list.name;
        
        // 书单内容网格
        const listGrid = document.createElement("div");
        listGrid.className = "book-grid";
        listGrid.style.marginBottom = "16px";
        
        // 添加书单内的书籍
        list.books.forEach(book => {
          const bookCard = document.createElement("div");
          bookCard.className = "book-card";
          bookCard.innerHTML = `
            <div class="book-cover">书</div>
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author || "未知作者"}</div>
          `;
          
          bookCard.addEventListener("click", () => {
            // 移除其他卡片的选中状态
            document.querySelectorAll(".book-card.selected").forEach(c => {
              c.classList.remove("selected");
            });
            // 添加当前卡片的选中状态
            bookCard.classList.add("selected");  
            openBookDetail(book);
          });
          
          listGrid.appendChild(bookCard);
        });
        
        listSection.appendChild(listTitle);
        listSection.appendChild(listGrid);
        tabLists.appendChild(listSection);
      });
    }

    const tabItems = document.querySelectorAll(".tab-item");
    const tabLists = document.getElementById("tab-lists");
    const tabBooks = document.getElementById("tab-books");
    const chipEls = document.querySelectorAll(".chip");
    const bookGrid = document.getElementById("book-grid");

    function renderBooks(category) {
      const filtered = category === "全部"
        ? books
        : books.filter(b => b.category === category);

      bookGrid.innerHTML = "";
      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "books-empty";
        empty.innerHTML = `
          <div class="empty-icon" style="margin-bottom:10px;"></div>
          <div>暂无书籍</div>
        `;
        bookGrid.appendChild(empty);
        return;
      }

      filtered.forEach(b => {
        const card = document.createElement("div");
        card.className = "book-card";
        card.innerHTML = `
          <div class="book-cover">书</div>
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author || "未知作者"}</div>
        `;
        card.addEventListener("click", () => {
          // 移除其他卡片的选中状态
          document.querySelectorAll(".book-card.selected").forEach(c => {
            c.classList.remove("selected");
          });
          // 添加当前卡片的选中状态
          card.classList.add("selected");
          // 打开书籍详情
          openBookDetail(b);
        });
        bookGrid.appendChild(card);
      });
    }

    // 默认渲染全部书籍
    renderBooks("全部");

    // Tab 切换
    tabItems.forEach(item => {
      item.addEventListener("click", () => {
        tabItems.forEach(t => t.classList.remove("active"));
        item.classList.add("active");

        const tab = item.dataset.tab;
        if (tab === "lists") {
          tabLists.style.display = "block";
          tabBooks.style.display = "none";
          renderLists(); // 切换到推荐书单时重新生成并渲染书单
        } else {
          tabLists.style.display = "none";
          tabBooks.style.display = "block";
        }
      });
    });

    // 页面加载时渲染推荐书单
    document.addEventListener('DOMContentLoaded', function() {
      // 如果当前激活的是推荐书单标签，直接渲染
      if (document.querySelector('.tab-item.active').dataset.tab === 'lists') {
        renderLists();
      }
    });

    // 分类筛选
    chipEls.forEach(chip => {
      chip.addEventListener("click", () => {
        chipEls.forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        renderBooks(chip.dataset.category);
      });
    });

    // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
