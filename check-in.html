<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>阅读打卡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体（与 home.html 一致） */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 0;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: visible;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部状态栏占位 */
    .status-bar {
      height: 8px;
    }

    /* 滚动内容区域 */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 0;
    }

    /* 阅读统计卡片 */
    .stats-card {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%);
      border-radius: 16px;
      padding: 18px 16px 16px;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
      margin-bottom: 14px;
    }
    .stats-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .stats-title {
      font-size: 16px;
      font-weight: 600;
    }
    .stats-icon {
      width: 20px;
      height: 20px;
      opacity: 0.9;
    }
    .stats-icon svg {
      width: 100%;
      height: 100%;
      stroke: #bfdbfe;
      fill: none;
      stroke-width: 1.8;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .stats-item {
      flex: 1;
      text-align: center;
    }
    .stats-number {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .stats-label {
      font-size: 12px;
      color: #dbeafe;
    }
    .stats-progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(191, 219, 254, 0.25);
      overflow: hidden;
    }
    .stats-progress-bar {
      width: 45%;
      height: 100%;
      border-radius: 999px;
      background: #bfdbfe;
    }

    /* 今日打卡按钮（虚线边框） */
    .today-checkin-wrapper {
      margin-bottom: 16px;
    }
    .today-checkin-btn {
      width: 100%;
      border-radius: 12px;
      border: 1.5px dashed #9ca3af;
      padding: 10px 0;
      background: rgba(249, 250, 251, 0.6);
      color: #374151;
      font-size: 14px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .today-checkin-btn-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #1e3a8a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f9fafb;
      font-size: 14px;
      line-height: 1;
    }

    /* 打卡记录标题 */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 10px;
    }

    /* 打卡记录卡片 */
    .record-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 16px;
    }
    .record-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 12px 13px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }
    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .record-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .record-date {
      font-size: 11px;
      color: #9ca3af;
    }
    .record-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b7280;
    }
    .record-meta-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .record-meta-icon svg {
      width: 100%;
      height: 100%;
      stroke: #1e3a8a;
      fill: none;
      stroke-width: 1.8;
    }

    .record-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .record-delete-btn {
      border: none;
      background: none;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
    }

    /* 打卡弹层 */
    .checkin-modal-mask {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: none;
      justify-content: center;
      align-items: flex-start;
      padding-top: 70px;
      z-index: 20;
    }

    .checkin-modal-mask.show {
      display: flex;
    }

    .checkin-modal {
      width: calc(100% - 28px);
      max-height: calc(100% - 120px);
      background: #f9fafb;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 14px 0 14px;
      overflow: hidden;
    }

    .checkin-modal-inner {
      max-height: 100%;
      overflow-y: auto;
      padding: 0 16px 4px;
    }

    .checkin-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 10px;
    }

    .checkin-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }

    .checkin-modal-close {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
    }

    .checkin-group-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .checkin-book-list {
      background: #f3f4f6;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .checkin-book-item {
      display: flex;
      align-items: center;
      padding: 9px 12px;
      font-size: 13px;
      color: #374151;
      border-bottom: 1px solid #e5e7eb;
      transition: background-color 0.18s ease;
      cursor: pointer;
    }

    .checkin-book-item:last-child {
      border-bottom: none;
    }

    .checkin-book-item:hover {
      background-color: #e5e7eb;
    }

    .checkin-book-item input:checked + span {
      font-weight: 600;
      color: #1e3a8a;
    }

    .checkin-book-item.selected {
      background-color: #dbeafe;
    }

    .checkin-book-item input {
      margin-right: 8px;
    }

    .checkin-input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      font-size: 13px;
      color: #111827;
      background: #ffffff;
      resize: none;
      min-height: 40px;
    }

    .checkin-input::placeholder {
      color: #9ca3af;
    }

    .checkin-field {
      margin-bottom: 10px;
    }

    .checkin-hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .checkin-submit-btn {
      margin-top: 8px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: #1d4ed8;
      color: #ffffff;
      padding: 10px 0;
      font-size: 14px;
      cursor: pointer;
    }

    /* 删除确认弹窗 */
    .confirm-mask {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    .confirm-mask.show {
      display: flex;
    }

    .confirm-dialog {
      width: 260px;
      background: #ffffff;
      border-radius: 14px;
      padding: 16px 16px 12px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.3);
    }

    .confirm-message {
      font-size: 14px;
      color: #111827;
      margin-bottom: 16px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .confirm-btn {
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      border: none;
      cursor: pointer;
    }

    .confirm-cancel {
      background: #e5e7eb;
      color: #374151;
    }

    .confirm-ok {
      background: #ef4444;
      color: #ffffff;
    }

    /* 底部占位 */
    .spacer {
      height: 12px;
    }

    /* 底部导航（与 home.html 保持一致，仅激活"打卡"） */
    .bottom-nav {
      height: 62px;
      border-top: 1px solid rgba(209, 213, 219, 0.8);
      background: rgba(248, 250, 252, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      margin-bottom: 0;
    }
    .bottom-nav a {
      text-decoration: none;
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      margin: 0 auto 2px;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .nav-item.active {
      color: #1e3a5f;
      font-weight: 600;
    }
    .nav-item.active .nav-icon svg {
      stroke: #1e3a5f;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
      .bottom-nav {
        border-radius: 0 !important;
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <div class="scroll-container">
        <!-- 阅读统计卡片 -->
        <div class="stats-card">
          <div class="stats-header">
            <div class="stats-title">阅读统计</div>
            <div class="stats-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 19h16" />
                <path d="M7 15v-6" />
                <path d="M12 15V5" />
                <path d="M17 15v-3" />
              </svg>
            </div>
          </div>
          <div class="stats-row">
            <div class="stats-item">
              <div class="stats-number">1</div>
              <div class="stats-label">打卡次数</div>
            </div>
            <div class="stats-item">
              <div class="stats-number">1</div>
              <div class="stats-label">打卡天数</div>
            </div>
          </div>
          <div class="stats-progress-track">
            <div class="stats-progress-bar"></div>
          </div>
        </div>

        <!-- 今日打卡 -->
        <div class="today-checkin-wrapper">
          <div class="today-checkin-btn" onclick="handleTodayCheckIn()">
            <div class="today-checkin-btn-icon">+</div>
            <span>今日打卡</span>
          </div>
        </div>

        <!-- 打卡记录 -->
        <div class="section-title">打卡记录</div>
        <div class="record-list">
          <div class="record-card" data-record-id="1">
            <div class="record-header">
              <div class="record-title">三体</div>
              <div class="record-date">2025-12-11</div>
            </div>
            <div class="record-meta">
              <div class="record-meta-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <rect x="4" y="3" width="16" height="18" rx="2" />
                  <path d="M8 9h8" />
                  <path d="M8 13h5" />
                </svg>
              </div>
              <span>已读 1 页 / 共 10 页</span>
            </div>
            <div class="record-actions">
              <button class="record-delete-btn" onclick="openDeleteConfirm(this)">删除记录</button>
            </div>
          </div>
        </div>

        <!-- 底部占位 -->
        <div class="spacer"></div>
      </div>

      <!-- 打卡弹层 -->
      <div class="checkin-modal-mask" id="checkinModalMask" onclick="handleModalMaskClick(event)">
        <div class="checkin-modal" onclick="event.stopPropagation()">
          <div class="checkin-modal-header">
            <div class="checkin-modal-title">今日打卡</div>
            <div class="checkin-modal-close" onclick="closeCheckinModal()">✕</div>
          </div>
          <div class="checkin-modal-inner">
            <div class="checkin-field">
              <div class="checkin-group-label">选择书籍</div>
              <div class="checkin-book-list">
                <label class="checkin-book-item">
                  <input type="radio" name="book" value="活着" checked />
                  <span>活着</span>
                </label>
                <label class="checkin-book-item">
                  <input type="radio" name="book" value="三体" />
                  <span>三体</span>
                </label>
                <label class="checkin-book-item">
                  <input type="radio" name="book" value="平凡的世界" />
                  <span>平凡的世界</span>
                </label>
                <label class="checkin-book-item">
                  <input type="radio" name="book" value="百年孤独" />
                  <span>百年孤独</span>
                </label>
                <label class="checkin-book-item">
                  <input type="radio" name="book" value="人类简史" />
                  <span>人类简史</span>
                </label>
                <label class="checkin-book-item">
                  <input type="radio" name="book" value="小王子" />
                  <span>小王子</span>
                </label>
              </div>
            </div>

            <div class="checkin-field">
              <div class="checkin-group-label">已读页数</div>
              <textarea class="checkin-input" id="inputReadPages" placeholder="请输入已读页数"></textarea>
            </div>

            <div class="checkin-field">
              <div class="checkin-group-label">总页数（可选）</div>
              <textarea class="checkin-input" id="inputTotalPages" placeholder="请输入总页数"></textarea>
            </div>

            <div class="checkin-field">
              <div class="checkin-group-label">阅读笔记（可选）</div>
              <textarea class="checkin-input" id="inputNote" placeholder="记录你的阅读感悟..."></textarea>
              <div class="checkin-hint">以上为静态示例，用于展示打卡表单布局。</div>
            </div>

            <button class="checkin-submit-btn" onclick="submitCheckin()">提交打卡</button>
          </div>
        </div>
      </div>

      <!-- 删除确认弹窗 -->
      <div class="confirm-mask" id="confirmMask">
        <div class="confirm-dialog">
          <div class="confirm-message">确认删除这条打卡记录吗？删除后不可恢复。</div>
          <div class="confirm-actions">
            <button class="confirm-btn confirm-cancel" onclick="cancelDelete()">取消</button>
            <button class="confirm-btn confirm-ok" onclick="confirmDelete()">确认</button>
          </div>
        </div>
      </div>

      <!-- 底部导航 -->
      <div class="bottom-nav">
    <a href="/">
        <div class="nav-item" onclick="window.location.href='home.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div>首页</div>
        </div>
      </a>
      <a href="{% url 'book-list' %}">
        <div class="nav-item" onclick="window.location.href='book-list.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            </svg>
          </div>
          <div>书单</div>
        </div>
        </a>
         <a href="{% url 'check-in' %}">
        <div class="nav-item active" onclick="window.location.href='check-in.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <div>打卡</div>
        </div>
      </a>
      <a href="{% url 'community' %}">
        <div class="nav-item" onclick="window.location.href='community.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div>社区</div>
        </div>
      </a>
      <a href="{% url 'profile' %}">
        <div class="nav-item" onclick="window.location.href='profile.html'">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div>我的</div>
        </div>
      </a>
      </div>

  <script>
    var currentRecordToDelete = null;
    var recordIdCounter = 1; // 记录ID计数器

    // 初始化记录ID计数器
    function initRecordIdCounter() {
      var existingRecords = document.querySelectorAll('.record-card[data-record-id]');
      var maxId = 0;
      existingRecords.forEach(function(record) {
        var id = parseInt(record.getAttribute('data-record-id'), 10);
        if (id > maxId) {
          maxId = id;
        }
      });
      recordIdCounter = maxId + 1;
    }

    function handleTodayCheckIn() {
      var mask = document.getElementById('checkinModalMask');
      if (mask) {
        mask.classList.add('show');
      }
      // 重置表单
      resetForm();
    }

    function closeCheckinModal() {
      var mask = document.getElementById('checkinModalMask');
      if (mask) {
        mask.classList.remove('show');
      }
      resetForm();
    }

    function resetForm() {
      // 重置表单到默认值
      var bookInputs = document.querySelectorAll('input[name="book"]');
      if (bookInputs.length > 0) {
        bookInputs[0].checked = true;
        // 更新选中状态样式
        var bookItems = document.querySelectorAll('.checkin-book-item');
        bookItems.forEach(function(item) {
          item.classList.remove('selected');
        });
        if (bookInputs[0].checked) {
          bookInputs[0].closest('.checkin-book-item').classList.add('selected');
        }
      }
      document.getElementById('inputReadPages').value = '';
      document.getElementById('inputTotalPages').value = '';
      document.getElementById('inputNote').value = '';
    }

    function submitCheckin() {
      // 获取选中的书籍
      var selectedBookInput = document.querySelector('input[name="book"]:checked');
      if (!selectedBookInput) {
        alert('请选择书籍');
        return;
      }
      var bookTitle = selectedBookInput.value;

      // 获取已读页数
      var pagesRead = document.getElementById('inputReadPages').value.trim();
      if (!pagesRead || isNaN(parseInt(pagesRead)) || parseInt(pagesRead) <= 0) {
        alert('请输入有效的已读页数');
        return;
      }

      // 获取总页数（可选）
      var totalPages = document.getElementById('inputTotalPages').value.trim();
      var totalPagesText = totalPages && !isNaN(parseInt(totalPages)) ? ' / 共 ' + totalPages + ' 页' : '';

      // 获取笔记（可选）
      var notes = document.getElementById('inputNote').value.trim();

      // 获取当前日期
      var today = new Date();
      var dateStr = today.getFullYear() + '-' + 
                   String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(today.getDate()).padStart(2, '0');

      // 创建新的记录卡片
      var recordList = document.querySelector('.record-list');
      if (!recordList) {
        console.error('找不到记录列表容器');
        return;
      }

      var newRecord = document.createElement('div');
      newRecord.className = 'record-card';
      newRecord.setAttribute('data-record-id', recordIdCounter++);

      var recordHtml = '<div class="record-header">' +
        '<div class="record-title">' + escapeHtml(bookTitle) + '</div>' +
        '<div class="record-date">' + dateStr + '</div>' +
        '</div>' +
        '<div class="record-meta">' +
        '<div class="record-meta-icon">' +
        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
        '<rect x="4" y="3" width="16" height="18" rx="2" />' +
        '<path d="M8 9h8" />' +
        '<path d="M8 13h5" />' +
        '</svg>' +
        '</div>' +
        '<span>已读 ' + escapeHtml(pagesRead) + ' 页' + escapeHtml(totalPagesText) + '</span>' +
        '</div>';

      if (notes) {
        recordHtml += '<div style="margin-top: 8px; font-size: 12px; color: #6b7280; line-height: 1.5;">' + 
                     escapeHtml(notes) + '</div>';
      }

      recordHtml += '<div class="record-actions">' +
        '<button class="record-delete-btn" onclick="openDeleteConfirm(this)">删除记录</button>' +
        '</div>';

      newRecord.innerHTML = recordHtml;

      // 将新记录添加到列表的末尾（旧记录下方）
      recordList.appendChild(newRecord);

      // 更新统计数字
      updateStats();

      // 关闭弹窗并重置表单
      closeCheckinModal();
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function handleModalMaskClick(event) {
      // 如果点击的是遮罩层本身（不是弹窗内容），则关闭弹窗
      if (event.target.id === 'checkinModalMask') {
        closeCheckinModal();
      }
    }

    function updateStats() {
      var recordCards = document.querySelectorAll('.record-card');
      var count = recordCards.length;
      
      // 更新打卡次数
      var countElements = document.querySelectorAll('.stats-number');
      if (countElements.length > 0) {
        countElements[0].textContent = count;
      }

      // 计算打卡天数（按日期去重）
      var dates = new Set();
      recordCards.forEach(function(card) {
        var dateElement = card.querySelector('.record-date');
        if (dateElement) {
          dates.add(dateElement.textContent);
        }
      });
      
      if (countElements.length > 1) {
        countElements[1].textContent = dates.size;
      }

      // 计算阅读书籍数（按书名去重）
      var books = new Set();
      recordCards.forEach(function(card) {
        var titleElement = card.querySelector('.record-title');
        if (titleElement) {
          books.add(titleElement.textContent);
        }
      });

      // 保存统计数据到 localStorage，与"我的"页面同步
      var stats = {
        checkinCount: count,
        readingDays: dates.size,
        bookCount: books.size
      };
      localStorage.setItem('readingStats', JSON.stringify(stats));
    }

    // 处理书籍项选中状态
    function initBookItemSelection() {
      var bookItems = document.querySelectorAll('.checkin-book-item');
      var bookInputs = document.querySelectorAll('.checkin-book-item input[type="radio"]');
      
      // 为每个 radio 添加 change 事件监听
      bookInputs.forEach(function(input) {
        input.addEventListener('change', function() {
          // 移除所有选中状态
          bookItems.forEach(function(item) {
            item.classList.remove('selected');
          });
          // 为当前选中的项添加选中状态
          if (this.checked) {
            this.closest('.checkin-book-item').classList.add('selected');
          }
        });
      });
      
      // 初始化时设置默认选中项的样式
      var checkedInput = document.querySelector('.checkin-book-item input[type="radio"]:checked');
      if (checkedInput) {
        checkedInput.closest('.checkin-book-item').classList.add('selected');
      }
    }

    // 页面加载时初始化统计数字和记录ID计数器
    document.addEventListener('DOMContentLoaded', function() {
      initRecordIdCounter();
      updateStats();
      initBookItemSelection();
    });

    function openDeleteConfirm(btn) {
      var card = btn;
      while (card && !card.classList.contains('record-card')) {
        card = card.parentNode;
      }
      currentRecordToDelete = card;
      var mask = document.getElementById('confirmMask');
      if (mask) {
        mask.classList.add('show');
      }
    }

    function cancelDelete() {
      currentRecordToDelete = null;
      var mask = document.getElementById('confirmMask');
      if (mask) {
        mask.classList.remove('show');
      }
    }

    function confirmDelete() {
      if (currentRecordToDelete && currentRecordToDelete.parentNode) {
        currentRecordToDelete.parentNode.removeChild(currentRecordToDelete);
        // 更新统计数字
        updateStats();
      }
      currentRecordToDelete = null;
      var mask = document.getElementById('confirmMask');
      if (mask) {
        mask.classList.remove('show');
      }
    }

    // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
</body>
</html>
