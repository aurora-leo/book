<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>我的</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体（保持一致） */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 0;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: visible;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部状态栏占位 */
    .status-bar {
      height: 8px;
    }

    /* 滚动内容区域 */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 0;
    }

    /* 顶部个人信息蓝色区域 */
    .profile-header {
      background: #0f4774;
      border-radius: 18px 18px 0 0;
      padding: 20px 18px 18px;
      color: #f9fafb;
      position: relative;
    }
    .profile-main {
      display: flex;
      align-items: center;
    }
    .avatar-wrapper {
      width: 70px;
      height: 70px;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.7);
      margin-right: 16px;
      background: linear-gradient(135deg,#f97316,#ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 26px;
      font-weight: 600;
    }
    .avatar-camera {
      position: absolute;
      left: 80px;
      top: 64px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(248, 250, 252, 0.8);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .avatar-camera:hover {
      background: rgba(15, 23, 42, 1);
      transform: scale(1.1);
    }
    .avatar-camera:active {
      transform: scale(0.95);
    }
    .avatar-camera svg {
      width: 14px;
      height: 14px;
      stroke: #f9fafb;
      fill: none;
      stroke-width: 1.6;
    }
    .avatar-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 999px;
    }
    #avatarInput {
      display: none;
    }
    .profile-text-name-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .profile-name {
      font-size: 18px;
      font-weight: 600;
      margin-right: 6px;
    }
    .profile-edit-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-edit-icon svg {
      width: 14px;
      height: 14px;
      stroke: #e5e7eb;
      fill: none;
      stroke-width: 1.7;
    }
    .profile-phone {
      font-size: 13px;
      opacity: 0.9;
      letter-spacing: 0.3px;
    }

    /* 昵称编辑区域样式 */
    .profile-edit-panel {
      margin-top: 14px;
      background: rgba(15, 23, 42, 0.16);
      border-radius: 14px;
      padding: 10px 10px 12px;
      display: none; /* 默认隐藏，点击昵称后显示 */
    }
    .profile-edit-input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: none;
      outline: none;
      font-size: 14px;
      color: #111827;
    }
    .profile-edit-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-start;
      gap: 10px;
    }
    .profile-edit-btn {
      min-width: 64px;
      padding: 6px 14px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      cursor: pointer;
    }
    .profile-edit-btn.save {
      background: #f9fafb;
      color: #0f172a;
    }
    .profile-edit-btn.cancel {
      background: transparent;
      color: #e5e7eb;
      border: 1px solid rgba(229, 231, 235, 0.7);
    }

    /* 阅读统计卡片 */
    .stats-card {
      margin-top: 16px;
      background: #f9fafb;
      border-radius: 14px;
      padding: 12px 12px 10px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.15);
    }
    .stats-title {
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 10px;
    }
    .stats-row {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .stat-item {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      position: relative;
    }
    .stat-item + .stat-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 20%;
      bottom: 20%;
      width: 1px;
      background: rgba(209, 213, 219, 0.8);
    }
    .stat-number {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: #6b7280;
    }
    .stats-button {
      width: 100%;
      padding: 8px 0;
      border-radius: 999px;
      border: none;
      font-size: 12px;
      background: #e5e7eb;
      color: #374151;
      cursor: pointer;
    }

    /* 白色功能列表卡片 */
    .section-card {
      background: #f9fafb;
      border-radius: 16px;
      margin-top: 14px;
      padding: 4px 2px 6px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.16);
    }
    .section-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      font-size: 14px;
      color: #111827;
      cursor: pointer;
    }
     .section-item a {
      text-decoration: none;
      color: inherit;
      flex: 1;
    }
    .section-item + .section-item {
      border-top: 1px solid rgba(229, 231, 235, 0.9);
    }
    .section-icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #0f4774;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
    }
    .section-icon svg {
      width: 12px;
      height: 12px;
      stroke: #f9fafb;
      fill: none;
      stroke-width: 1.7;
    }
    .section-label {
      flex: 1;
    }
    .section-arrow {
      width: 14px;
      height: 14px;
    }
    .section-arrow svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.7;
    }

    /* 退出登录按钮 */
    .logout-wrapper {
      margin-top: 18px;
      background: #f9fafb;
      border-radius: 16px;
      padding: 10px 12px 12px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.16);
    }
    .logout-btn {
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 500;
      background: #fee2e2;
      color: #b91c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .logout-btn-icon {
      width: 16px;
      height: 16px;
      margin-right: 6px;
    }
    .logout-btn-icon svg {
      width: 100%;
      height: 100%;
      stroke: #b91c1c;
      fill: none;
      stroke-width: 1.7;
    }

    /* 底部占位 */
    .spacer {
      height: 18px;
    }

    /* 底部导航（与 community.html 一致，但激活"我的"） */
    .bottom-nav {
      height: 62px;
      border-top: 1px solid rgba(209, 213, 219, 0.8);
      background: rgba(248, 250, 252, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      margin-bottom: 0;
    }
    .bottom-nav a {
      text-decoration: none;
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      margin: 0 auto 2px;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.5;
    }
    .nav-item.active {
      color: #1e3a5f;
      font-weight: 600;
    }
    .nav-item.active .nav-icon svg {
      stroke: #1e3a5f;
    }

    /* 确认对话框样式 */
    .confirm-dialog-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      border-radius: 22px;
    }
    .confirm-dialog-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .confirm-dialog {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.3);
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    .confirm-dialog-overlay.show .confirm-dialog {
      transform: scale(1);
    }
    .confirm-dialog-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
      text-align: center;
    }
    .confirm-dialog-message {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.5;
    }
    .confirm-dialog-actions {
      display: flex;
      gap: 12px;
    }
    .confirm-dialog-btn {
      flex: 1;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .confirm-dialog-btn:active {
      opacity: 0.7;
    }
    .confirm-dialog-btn.cancel {
      background: #f3f4f6;
      color: #374151;
    }
    .confirm-dialog-btn.confirm {
      background: #b91c1c;
      color: #ffffff;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
      .bottom-nav {
        border-radius: 0 !important;
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
      .confirm-dialog-overlay {
        border-radius: 0 !important;
      }
    }
  </style>
</head>

      <!-- 退出登录确认对话框 -->
      <div class="confirm-dialog-overlay" id="confirmDialog">
        <div class="confirm-dialog">
          <div class="confirm-dialog-title">确认退出</div>
          <div class="confirm-dialog-message">确定要退出登录吗？</div>
          <div class="confirm-dialog-actions">
            <button class="confirm-dialog-btn cancel" id="cancelLogoutBtn">取消</button>

  <script>
    // 加载并更新阅读统计数据（从 localStorage 同步）
    function loadReadingStats() {
      var statsStr = localStorage.getItem('readingStats');
      if (statsStr) {
        try {
          var stats = JSON.parse(statsStr);
          var checkinCountEl = document.getElementById('statCheckinCount');
          var bookCountEl = document.getElementById('statBookCount');
          var readingDaysEl = document.getElementById('statReadingDays');
          
          if (checkinCountEl) checkinCountEl.textContent = stats.checkinCount || 0;
          if (bookCountEl) bookCountEl.textContent = stats.bookCount || 0;
          if (readingDaysEl) readingDaysEl.textContent = stats.readingDays || 0;
        } catch (e) {
          console.error('读取统计数据失败:', e);
        }
      }
    }

    // 昵称编辑交互逻辑：点击昵称/铅笔图标，显示编辑面板；保存或取消后收起
    document.addEventListener('DOMContentLoaded', function () {
      // 加载阅读统计
      loadReadingStats();
      var nameRow = document.querySelector('.profile-text-name-row');
      var editIcon = document.querySelector('.profile-edit-icon');
      var editPanel = document.getElementById('profileEditPanel');
      var input = document.getElementById('nicknameInput');
      var saveBtn = document.getElementById('saveNicknameBtn');
      var cancelBtn = document.getElementById('cancelNicknameBtn');
      var nameEl = document.querySelector('.profile-name');
      var avatarEl = document.querySelector('.avatar-wrapper');

      if (!nameRow || !editPanel || !input || !saveBtn || !cancelBtn || !nameEl || !avatarEl) {
        return;
      }

      function showEditPanel() {
        input.value = (nameEl.textContent || '').trim();
        editPanel.style.display = 'block';
        input.focus();
      }

      function hideEditPanel() {
        editPanel.style.display = 'none';
      }

      nameRow.addEventListener('click', showEditPanel);
      if (editIcon) {
        editIcon.addEventListener('click', function (e) {
          e.stopPropagation();
          showEditPanel();
        });
      }

      saveBtn.addEventListener('click', function () {
        var newName = (input.value || '').trim();
        if (!newName) {
          newName = '未命名';
        }
        nameEl.textContent = newName;
        avatarEl.textContent = newName;
        hideEditPanel();
      });

      cancelBtn.addEventListener('click', function () {
        hideEditPanel();
      });

      // 头像更换功能
      var avatarCameraBtn = document.getElementById('avatarCameraBtn');
      var avatarInput = document.getElementById('avatarInput');

      if (avatarCameraBtn && avatarInput && avatarEl) {
        avatarCameraBtn.addEventListener('click', function () {
          avatarInput.click();
        });

        avatarInput.addEventListener('change', function (e) {
          var file = e.target.files[0];
          if (file && file.type.startsWith('image/')) {
            var reader = new FileReader();
            reader.onload = function (event) {
              // 清空文字内容并添加图片
              avatarEl.textContent = '';
              
              // 检查是否已有图片元素
              var existingImg = avatarEl.querySelector('.avatar-image');
              if (existingImg) {
                existingImg.src = event.target.result;
              } else {
                var img = document.createElement('img');
                img.src = event.target.result;
                img.className = 'avatar-image';
                img.alt = '用户头像';
                avatarEl.appendChild(img);
              }
              
              // 保存到 localStorage
              localStorage.setItem('userAvatar', event.target.result);
            };
            reader.readAsDataURL(file);
          }
          // 重置 input，允许选择同一张图片
          avatarInput.value = '';
        });

        // 页面加载时恢复保存的头像
        var savedAvatar = localStorage.getItem('userAvatar');
        if (savedAvatar) {
          avatarEl.textContent = '';
          var img = document.createElement('img');
          img.src = savedAvatar;
          img.className = 'avatar-image';
          img.alt = '用户头像';
          avatarEl.appendChild(img);
        }
      }

      // 退出登录功能
      var logoutBtn = document.getElementById('logoutBtn');
      var confirmDialog = document.getElementById('confirmDialog');
      var confirmBtn = document.getElementById('confirmLogoutBtn');
      var cancelConfirmBtn = document.getElementById('cancelLogoutBtn');

      if (logoutBtn && confirmDialog && confirmBtn && cancelConfirmBtn) {
        logoutBtn.addEventListener('click', function () {
          confirmDialog.classList.add('show');
        });

        confirmBtn.addEventListener('click', function () {
          window.location.href = 'login.html';
        });

        cancelConfirmBtn.addEventListener('click', function () {
          confirmDialog.classList.remove('show');
        });

        // 点击遮罩层关闭对话框
        confirmDialog.addEventListener('click', function (e) {
          if (e.target === confirmDialog) {
            confirmDialog.classList.remove('show');
          }
        });
      }
    });

    // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
