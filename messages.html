<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>我的消息</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 0;
      color: #111827;
    }

    /* 左侧二维码区域 - 与手机壳居中对齐 */
    .qr-wrapper {
      width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 32px;
      height: 860px;
    }
    .qr-card {
      width: 170px;
      padding: 16px 16px 20px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .qr-card-title {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-card-title-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }
    .qr-card-title-icon svg {
      width: 100%;
      height: 100%;
      stroke: #4b5563;
      fill: none;
      stroke-width: 1.5;
    }
    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .qr-placeholder canvas,
    .qr-placeholder img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    /* 手机壳整体（保持一致） */
    .phone-shell {
      width: 390px;
      height: 860px;
      border-radius: 28px;
      background: #f5f1e8;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
    }
    .phone-inner {
      flex: 1;
      border-radius: 22px;
      background: #f5f1e8;
      overflow: visible;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部状态栏占位 */
    .status-bar {
      height: 8px;
    }

    /* 顶部导航栏 */
    .nav-header {
      height: 50px;
      background: #f5f1e8;
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
    }
    .nav-back {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 12px;
    }
    .nav-back svg {
      width: 20px;
      height: 20px;
      stroke: #111827;
      fill: none;
      stroke-width: 2;
    }
    .nav-title {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      text-align: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-action {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-left: auto;
    }
    .nav-action svg {
      width: 18px;
      height: 18px;
      stroke: #6b7280;
      fill: none;
      stroke-width: 1.5;
    }

    /* 滚动内容区域 */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      background: #f5f1e8;
    }

    /* 消息列表项 */
    .message-list {
      padding: 0;
    }
    .message-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.6);
      cursor: pointer;
      background: #ffffff;
    }
    .message-item:active {
      background: #f9fafb;
    }
    .message-icon {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .message-icon.system,
    .message-icon.friends {
      background: #fff4e6;
    }
    .message-icon.temporary {
      background: #fff4e6;
    }
    .message-icon svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.8;
    }
    .message-icon.system svg,
    .message-icon.friends svg,
    .message-icon.temporary svg {
      stroke: #fb923c;
    }
    .message-content {
      flex: 1;
      min-width: 0;
    }
    .message-title {
      font-size: 15px;
      font-weight: 500;
      color: #111827;
      margin-bottom: 4px;
    }
    .message-subtitle {
      font-size: 13px;
      color: #6b7280;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .message-badge {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fb923c;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .message-badge.hidden {
      display: none;
    }
    
    /* Toast 提示样式 */
    .toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1001;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }

    /* 移动端适配 - 隐藏二维码并全屏显示 */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        background: #f5f1e8;
      }
      .qr-wrapper {
        display: none !important;
      }
      .phone-shell {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        background: #f5f1e8 !important;
      }
      .phone-inner {
        border-radius: 0 !important;
        height: 100% !important;
      }
      .status-bar {
        height: env(safe-area-inset-top, 0px) !important;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧二维码展示 -->
  <div class="qr-wrapper">
    <div class="qr-card">
      <div class="qr-card-title">
        <div class="qr-card-title-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" />
          </svg>
        </div>
        <span>手机扫码预览</span>
      </div>
      <div class="qr-placeholder" id="qrPlaceholder"></div>
    </div>
  </div>

  <!-- 右侧手机界面 -->
  <div class="phone-shell">
    <div class="phone-inner">
      <div class="status-bar"></div>

      <!-- 顶部导航栏 -->
      <div class="nav-header">
        <div class="nav-back" onclick="window.location.href='profile.html'">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </div>
        <div class="nav-title">我的消息</div>
        <div class="nav-action" id="clearBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <path d="M5 6h14l-1 14H6L5 6z" fill="none" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </div>
      </div>

      <!-- 消息列表 -->
      <div class="scroll-container">
        <div class="message-list">
          <!-- 系统通知 -->
          <div class="message-item">
            <div class="message-icon system">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                <line x1="10" y1="8" x2="14" y2="8" />
              </svg>
            </div>
            <div class="message-content">
              <div class="message-title">系统通知</div>
              <div class="message-subtitle" id="systemSubtitle">测试1</div>
            </div>
            <div class="message-badge" id="systemBadge"></div>
          </div>

          <!-- 好友私信 -->
          <div class="message-item">
            <div class="message-icon friends">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
            <div class="message-content">
              <div class="message-title">好友私信</div>
              <div class="message-subtitle" id="friendsSubtitle">小明向你发来消息</div>
            </div>
            <div class="message-badge" id="friendsBadge"></div>
          </div>

          <!-- 临时对话 -->
          <div class="message-item">
            <div class="message-icon temporary">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              </svg>
            </div>
            <div class="message-content">
              <div class="message-title">临时对话</div>
              <div class="message-subtitle">暂无未读消息</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Toast 提示 -->
      <div class="toast" id="toast">暂无未读的消息</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const clearBtn = document.getElementById('clearBtn');
      const systemBadge = document.getElementById('systemBadge');
      const friendsBadge = document.getElementById('friendsBadge');
      const systemSubtitle = document.getElementById('systemSubtitle');
      const friendsSubtitle = document.getElementById('friendsSubtitle');
      const toast = document.getElementById('toast');

      // 显示 Toast
      function showToast() {
        toast.classList.add('show');
        setTimeout(function () {
          toast.classList.remove('show');
        }, 2000);
      }

      // 清理所有未读消息
      clearBtn.addEventListener('click', function () {
        // 隐藏所有红点
        if (systemBadge) {
          systemBadge.classList.add('hidden');
        }
        if (friendsBadge) {
          friendsBadge.classList.add('hidden');
        }

        // 清空消息内容
        if (systemSubtitle) {
          systemSubtitle.textContent = '';
        }
        if (friendsSubtitle) {
          friendsSubtitle.textContent = '暂无未读消息';
        }

        // 显示提示
        showToast();
      });
    });

    // 直接使用在线API生成二维码（不依赖CDN）
    (function() {
      function generateQRCode() {
        var qrPlaceholder = document.getElementById('qrPlaceholder');
        if (!qrPlaceholder) return;
        
        var currentUrl = window.location.href;
        var encodedUrl = encodeURIComponent(currentUrl);
        
        // 使用多个在线二维码API，按顺序尝试
        var apiUrls = [
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=2&data=' + encodedUrl,
          'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodedUrl,
          'https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=' + encodedUrl,
          'https://qr-server.com/api/v1/create-qr-code/?size=200x200&data=' + encodedUrl
        ];
        
        var img = document.createElement('img');
        var apiIndex = 0;
        var retryCount = 0;
        var maxRetries = apiUrls.length;
        
        function tryNextAPI() {
          if (apiIndex >= apiUrls.length) {
            // 如果所有API都失败，尝试重新开始
            if (retryCount < 2) {
              retryCount++;
              apiIndex = 0;
              setTimeout(tryNextAPI, 1000);
              return;
            }
            qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;padding:10px;text-align:center;">二维码加载失败<br>请刷新页面重试</div>';
            return;
          }
          
          // 创建新的img元素，避免缓存问题
          img = document.createElement('img');
          img.src = apiUrls[apiIndex] + '&t=' + Date.now(); // 添加时间戳避免缓存
          img.alt = '二维码';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.borderRadius = '8px';
          img.style.display = 'block';
          
          var loadTimeout = setTimeout(function() {
            img.onload = null;
            img.onerror = null;
            apiIndex++;
            tryNextAPI();
          }, 3000);
          
          img.onload = function() {
            clearTimeout(loadTimeout);
            qrPlaceholder.innerHTML = '';
            qrPlaceholder.appendChild(img);
            console.log('二维码生成成功，使用API:', apiUrls[apiIndex]);
          };
          
          img.onerror = function() {
            clearTimeout(loadTimeout);
            console.warn('API加载失败，尝试下一个:', apiUrls[apiIndex]);
            apiIndex++;
            tryNextAPI();
          };
        }
        
        // 显示加载状态
        qrPlaceholder.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:12px;">加载中...</div>';
        
        // 开始尝试
        tryNextAPI();
      }
      
      // 页面加载完成后生成二维码
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', generateQRCode);
      } else {
        generateQRCode();
      }
      
      // 每60秒刷新一次二维码
      setInterval(function() {
        generateQRCode();
      }, 60000);
    })();
  </script>
</body>
</html>
